<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBSIDIAN GATEWAY</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;400;700;800&display=swap');
        
        body {
            background-color: #030303; 
            color: #fff; 
            font-family: 'JetBrains Mono', monospace;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
            overflow: hidden;
        }
        
        .container { 
            text-align: center; 
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        /* --- LOGIN SCREEN UI --- */
        #login-screen {
            transition: opacity 0.5s ease;
        }
        
        .sys-header {
            font-size: 10px; 
            color: #555; 
            margin-bottom: 30px; 
            letter-spacing: 6px;
            text-transform: uppercase;
        }

        input {
            background: transparent; 
            border: none; 
            border-bottom: 1px solid #333;
            color: #fff; 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 18px;
            padding: 15px 10px; 
            text-align: center; 
            outline: none; 
            letter-spacing: 3px;
            transition: all 0.3s;
            width: 80%;
        }
        
        input:focus { 
            border-bottom: 1px solid #4CAF50; 
            box-shadow: 0 10px 20px -10px rgba(76, 175, 80, 0.2);
        }
        
        .error { 
            color: #ff4444; 
            font-size: 11px; 
            margin-top: 20px; 
            opacity: 0; 
            transition: opacity 0.3s; 
            letter-spacing: 1px;
        }

        /* --- SOLO LEVELING SCREEN UI --- */
        #welcome-screen {
            display: none;
            opacity: 0;
            transition: opacity 0.8s ease;
            text-align: center;
        }

        .level-up-text {
            font-size: 12px;
            color: #4CAF50;
            letter-spacing: 4px;
            margin-bottom: 10px;
            animation: pulse 1.5s infinite;
        }

        .player-name {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 2px;
            margin: 0;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        .sync-text {
            font-size: 10px;
            color: #666;
            margin-top: 30px;
            letter-spacing: 2px;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
        
        /* Glitch effect for immersion */
        .glitch {
            position: relative;
        }
    </style>
</head>
<body>

    <!-- SCREEN 1: THE GATE -->
    <div class="container" id="login-screen">
        <div class="sys-header">THE M.O.E. COMMAND GATE</div>
        <input type="password" id="accessCode" placeholder="ENTER ACCESS KEY" autocomplete="off">
        <div class="error" id="errorMsg">INVALID CREDENTIALS. NODE LOCKED.</div>
    </div>

    <!-- SCREEN 2: THE AWAKENING (SOLO LEVELING VIBE) -->
    <div class="container" id="welcome-screen">
        <div class="level-up-text">SYSTEM UNLOCKED</div>
        <h1 class="player-name">HELLO, <br><span id="playerNameDisplay" style="color: #4CAF50;">PLAYER</span></h1>
        <div class="sync-text" id="syncStatus">Syncing neural link...</div>
    </div>

    <script>
        // ==========================================
        // THE ARCHITECT'S DICTIONARY (THE BACKEND)
        // ==========================================
        // Add new clients here. Format: "PASSWORD": { name: "PLAYER_ID", route: "DESTINATION_URL" }
        
        const gatewayLogic = {
            // Your Master Login
            "ARCHITECT-001": { 
                name: "ARCHITECT", 
                route: "/master-dashboard.html" // Change to your actual master link
            },
            
            // Client 1 (e.g., Elaine's Protocol)
            "P013-UNWIND": { 
                name: "PLAYER 042", 
                route: "p045_nlp_spatial_dynamics.html" // Just an example routing
            },
            
            // Client 2 (e.g., Danny's Audit)
            "DANNY-SYS": { 
                name: "FOUNDER NODE", 
                route: "ops_kinetic_pricing_v2.html" 
            },

            // The Unified System Gate (Diagnostic)
            "START": {
                name: "INITIATE",
                route: "https://moe-unified-system-gate.vercel.app"
            }
        };

        // ==========================================
        // THE EXECUTION ENGINE
        // ==========================================
        const inputField = document.getElementById('accessCode');
        const errorMsg = document.getElementById('errorMsg');
        const loginScreen = document.getElementById('login-screen');
        const welcomeScreen = document.getElementById('welcome-screen');
        const playerNameDisplay = document.getElementById('playerNameDisplay');
        const syncStatus = document.getElementById('syncStatus');

        inputField.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const code = inputField.value.trim().toUpperCase();
                
                if (gatewayLogic[code]) {
                    // 1. Success! Hide error, prepare transition.
                    errorMsg.style.opacity = "0";
                    inputField.blur(); // Remove keyboard on mobile
                    
                    // 2. Fade out Login Screen
                    loginScreen.style.opacity = "0";
                    
                    setTimeout(() => {
                        loginScreen.style.display = "none";
                        
                        // 3. Inject Player Name and Show Welcome Screen
                        playerNameDisplay.innerText = gatewayLogic[code].name;
                        welcomeScreen.style.display = "block";
                        
                        // 4. Fade in Welcome Screen
                        setTimeout(() => {
                            welcomeScreen.style.opacity = "1";
                        }, 50);

                        // 5. Simulate Loading text changes for immersion
                        setTimeout(() => { syncStatus.innerText = "Decrypting protocol parameters..."; }, 800);
                        setTimeout(() => { syncStatus.innerText = "Establishing secure connection..."; }, 1600);

                        // 6. Final Redirect to the specific protocol/asset
                        setTimeout(() => {
                            window.location.href = gatewayLogic[code].route;
                        }, 2500); // 2.5 second delay before warp
                        
                    }, 500); // Wait for fade out
                    
                } else {
                    // Failure. Show error, clear input.
                    errorMsg.style.opacity = "1";
                    inputField.value = '';
                }
            }
        });
    </script>
</body>
</html>
